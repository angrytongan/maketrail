<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maketrail — terrain spike</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #1c1e22;
        color: #eee;
        font: 13px system-ui, sans-serif;
      }
      canvas { display: block; }

      .app {
        box-sizing: border-box;
        height: 100%;
        padding: 12px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 12px;
      }
      .views {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        min-height: 0;
      }
      .card {
        background: #26292f;
        border: 1px solid #383c44;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .card-header {
        padding: 8px 12px;
        border-bottom: 1px solid #383c44;
        font-weight: 600;
      }
      .card-body {
        position: relative;
        flex: 1;
        min-height: 0;
      }
      .card-body > canvas {
        position: absolute;
        inset: 0;
      }

      #roller-controls {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 4px 8px;
        align-items: center;
        padding: 10px 14px;
      }
      #roller-controls span { text-align: right; min-width: 3.5em; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="views">
        <div class="card">
          <div class="card-header">2D Plan View</div>
          <div class="card-body" id="view-2d-body"></div>
        </div>
        <div class="card">
          <div class="card-header">3D View</div>
          <div class="card-body" id="view-3d-body"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Roller Controls</div>
        <div id="roller-controls">
          <label for="roller-length">Length</label>
          <input type="range" id="roller-length" min="1" max="8" step="0.1" value="3" />
          <span id="roller-length-value"></span>

          <label for="roller-height">Height</label>
          <input type="range" id="roller-height" min="0.05" max="1" step="0.01" value="0.3" />
          <span id="roller-height-value"></span>

          <label for="roller-width">Width</label>
          <input type="range" id="roller-width" min="0.3" max="4" step="0.1" value="1.2" />
          <span id="roller-width-value"></span>

          <label for="roller-pos-x">Position X</label>
          <input type="range" id="roller-pos-x" min="-9" max="9" step="0.1" value="0" />
          <span id="roller-pos-x-value"></span>

          <label for="roller-pos-z">Position Z</label>
          <input type="range" id="roller-pos-z" min="-9" max="9" step="0.1" value="0" />
          <span id="roller-pos-z-value"></span>

          <label for="roller-elevation">Elevation</label>
          <input type="range" id="roller-elevation" min="0" max="4" step="0.1" value="3" />
          <span id="roller-elevation-value"></span>

          <label for="roller-rotation">Rotation</label>
          <input type="range" id="roller-rotation" min="0" max="359" step="1" value="0" />
          <span id="roller-rotation-value"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
